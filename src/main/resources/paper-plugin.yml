name: WerewolfPlugin
version: 0.1.0
main: io.github.sparkletinkercat.creaturesPlugin.WerewolfPlugin
description: An example plugin
author: Sparklesongfall
website: https://papermc.io
api-version: '1.21'
load: STARTUP
libraries:
  - com.google.guava:guava:30.1.1-jre
  - com.google.code.gson:gson:2.8.6

commands:
  werewolf:
    description: "This command gives a player a specific tag"
    usage: "/werewolf"
    aliases: [w, were]
    permission: permission.node
    permission-message: "You do not have permission to use this command"

permissions:
  permission.node:
    description: "Allows using the werewolf command"
    default: op
